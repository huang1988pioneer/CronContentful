name: Cron Contentful

on:
  schedule:
    # GitHub cron uses UTC. 21:05 UTC is 05:05 in Asia/Taipei.
    - cron: "5 21 * * *"
    # Odd hours at :33 in Asia/Taipei (add) — UTC odd hours: 01,03,07,09,11,13,15 → UTC-8 shift covers 17,19,23
    - cron: "33 1,3,7,9,11,13,15,17,19,23 * * *"
    # Odd hours at :37 in Asia/Taipei (read)
    - cron: "37 1,3,7,9,11,13,15,17,19,23 * * *"
    # Even hours at :33 in Asia/Taipei (update) — UTC even hours: 0,2,6,8,10,12,14,16,18,22
    - cron: "33 0,2,6,8,10,12,14,16,18,22 * * *"
    # Even hours at :37 in Asia/Taipei (delete)
    - cron: "37 0,2,6,8,10,12,14,16,18,22 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose a manual action"
        type: choice
        options:
          - add
          - read
          - update
          - delete
          - auto
          - start
        required: false
        default: "add"
      delete_target:
        description: "Entry to delete when action is delete"
        type: choice
        options:
          - latest
          - oldest
        required: false
        default: "latest"

jobs:
  cron-contentful:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CronContentful task
        run: npm run cron
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ENVIRONMENT_ID: ${{ secrets.CONTENTFUL_ENVIRONMENT_ID || 'master' }}
          CONTENTFUL_MANAGEMENT_TOKEN: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          CONTENTFUL_LOCALE: ${{ secrets.CONTENTFUL_LOCALE || 'en-US' }}
          CRON_TIME_ZONE: Asia/Taipei
          CRON_ACTION: ${{ inputs.action || 'auto' }}
          CRON_DELETE_TARGET: ${{ inputs.delete_target || 'latest' }}
